spring.application.name=demo
# === BASE DE DATOS ===
spring.datasource.url=jdbc:postgresql://localhost:5432/elmensajero_db
spring.datasource.username=postgres
spring.datasource.password=0202
spring.datasource.driver-class-name=org.postgresql.Driver

# === JPA ===
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# === FLYWAY (migraciones) ===
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# === AUDITORIA ===
spring.jpa.properties.org.hibernate.envers.audit_table_suffix=_auditoria
spring.jpa.properties.org.hibernate.envers.store_data_at_delete=true

# === JWT ===
app.jwt.secret=TuClaveSecretaMuyLargaDeAlMenos256BitsParaHS256Algorithm
app.jwt.expiration-ms=86400000

# === SWAGGER ===
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# === ACTUATOR ===
management.endpoints.web.exposure.include=health,info,metrics


spring.mvc.cors.allowed-origins=*